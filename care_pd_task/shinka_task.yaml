# ShinkaEvolve config — CARE-PD UPDRS gait prediction (Phase 1: clinical classification)
#
# Local run (smoke / development):
#   cd ShinkaEvolveCarePD
#   PYTHONUTF8=1 ShinkaEvolve/.venv/Scripts/shinka_run \
#     --task-dir care_pd_task \
#     --results_dir results/care_pd_local \
#     --num_generations 30 \
#     --config-fname shinka_task.yaml
#
# RunPod (full run — set evo.max_api_costs and num_generations via CLI):
#   shinka_run --task-dir /workspace/care_pd_task \
#              --results_dir /workspace/results/care_pd_full \
#              --num_generations 100 \
#              --config-fname shinka_task.yaml \
#              --set evo.max_api_costs=15.0 \
#              --max-evaluation-jobs 4

# ── Concurrency ────────────────────────────────────────────────────────────────
# Local laptop: eval takes ~4-8s on CPU, so 2 parallel evals is safe.
# RunPod GPU: raise to 4-6 via --max-evaluation-jobs on the CLI.
max_evaluation_jobs: 2
max_proposal_jobs: 2
max_db_workers: 4
verbose: true

# ── Island / archive config ────────────────────────────────────────────────────
db_config:
  num_islands: 2
  archive_size: 60
  elite_selection_ratio: 0.25
  num_archive_inspirations: 2
  num_top_k_inspirations: 1
  migration_interval: 8
  migration_rate: 0.1
  island_elitism: true
  enforce_island_separation: true
  parent_selection_strategy: weighted
  parent_selection_lambda: 10.0
  archive_selection_strategy: crowding
  archive_criteria:
    combined_score: 1.0
    loc: -0.1
  enable_dynamic_islands: true
  stagnation_threshold: 12
  island_spawn_strategy: best
  island_spawn_subtree_size: 3

# ── Evolution config ──────────────────────────────────────────────────────────
evo_config:
  # Mutation operators
  patch_types: ["diff", "full", "cross"]
  patch_type_probs: [0.55, 0.30, 0.15]

  # Budget (override via CLI --num_generations and --set evo.max_api_costs)
  num_generations: 30
  max_api_costs: 3.0

  # Quality controls
  max_patch_resamples: 3
  max_patch_attempts: 2
  max_novelty_attempts: 2

  # Execution
  job_type: local
  language: python

  # LLM model pool
  # Anthropic: direct API, cost-tracked in max_api_costs
  # OpenRouter: use openrouter/ prefix — costs NOT tracked (N/A in pricing.csv)
  # Gemini: direct API used for embeddings only (see embedding_model below)
  llm_models:
    - "claude-opus-4-6"                                  # Anthropic direct — primary
    - "claude-sonnet-4-6"                                # Anthropic direct — fast
    - "openrouter/google/gemini-2.5-pro-preview"          # OpenRouter — strong reasoner
    - "openrouter/google/gemini-2.5-flash-preview"          # OpenRouter — fast/cheap
    - "openrouter/qwen/qwen3-235b-a22b-2507"              # OpenRouter — diverse, cheap

  llm_kwargs:
    temperatures: [0.0, 0.5, 1.0]
    max_tokens: 32768

  # UCB bandit — adaptive model selection
  llm_dynamic_selection: ucb1
  llm_dynamic_selection_kwargs:
    exploration_coef: 1.0
    cost_aware_coef: 0.6

  # Meta-recommendations every 8 generations
  meta_rec_interval: 8
  meta_llm_models: ["claude-sonnet-4-6"]
  meta_llm_kwargs:
    temperatures: [0.0]
    max_tokens: 16384

  # Novelty gating (cheap model)
  novelty_llm_models: ["openrouter/google/gemini-2.5-flash-preview"]
  novelty_llm_kwargs:
    temperatures: [0.0]

  # Embedding for code-similarity deduplication
  embedding_model: "gemini-embedding-exp-03-07"
  code_embed_sim_threshold: 0.99

  # Adaptive oversubscription
  enable_controlled_oversubscription: true
  proposal_target_mode: adaptive
  proposal_target_min_samples: 5
  proposal_target_ratio_cap: 2.0
  proposal_buffer_max: 2
  proposal_target_ewma_alpha: 0.3

  # Prompt evolution
  evolve_prompts: true
  prompt_evolution_interval: 8
  prompt_patch_types: ["diff", "full"]
  prompt_patch_type_probs: [0.5, 0.5]
  prompt_archive_size: 10
  prompt_ucb_exploration_constant: 2.0
  prompt_epsilon: 0.25
  prompt_percentile_recompute_interval: 5

  # Domain system message
  task_sys_msg: |
    You are an expert in clinical gait analysis and deep learning for Parkinson's Disease.
    You are improving a Python program that classifies UPDRS gait severity (0=normal,
    1=mild PD, 2=moderate/severe PD) from raw SMPL pose sequences.

    == DATASET ==
    BMCLab: 23 subjects, 781 walks, UPDRS_GAIT in {0,1,2}, 6-fold subject-level CV.
    Class distribution: {0: 341, 1: 276, 2: 164} — imbalanced; class 2 (severe) is
    clinically most important.
    Fitness: macro-F1 across all folds (higher = better). Current baseline: MotionCLIP
    pretrained features + MLP. Target: 0.68+ (LOSO SOTA), 0.74+ (MIDA SOTA).

    == INPUT FORMAT ==
    data[subject_id][walk_id]["pose"]: shape (T, 72) float32
    T varies ~210–3015 frames at 30 fps (~2–10s walking bouts).
    72 = 24 SMPL joints × 3 axis-angle rotation components.
    SMPL-24 joint order: pelvis, L/R hip, spine1, L/R knee, spine2, L/R ankle,
    spine3, L/R foot, neck, L/R collar, head, L/R shoulder, L/R elbow, L/R wrist,
    L/R hand.

    == ENVIRONMENT ==
    GPU available (CUDA). Use DEVICE = torch.device("cuda" if torch.cuda.is_available() else "cpu").
    CARE-PD repo is already on sys.path — import directly (no sys.path.insert needed):

    WORKING IMPORTS (verified importable):
      from data.preprocessing.preprocessing_utils import (
          axis_angle_to_matrix,      # (N,3) → (N,3,3) rotation matrices
          matrix_to_rotation_6d,     # (N,3,3) → (N,6) 6D representation
          get_6D_rep_from_24x3_pose, # (24,3) → (25,6) per-frame conversion
      )
      from model.backbone_loader import load_pretrained_backbone, load_pretrained_weights
      from model.motionclip.transformer import Encoder_TRANSFORMER
      from model.motion_encoder import MotionEncoder, ClassifierHead
      from learning.criterion import FocalLoss, WCELoss
      from learning.utils import compute_class_weights
      from data.dataloaders import DataPreprocessor
      from utility.transforms.skeleton import Skeleton
      from utility.transforms.quaternion import qrot_np, qbetween_np

    PRETRAINED CHECKPOINTS (care_pd_dir is passed to run_evaluation as kwarg):
      {care_pd_dir}/assets/Pretrained_checkpoints/motionclip/motionclip_encoder_checkpoint_0100.pth.tar
      {care_pd_dir}/assets/Pretrained_checkpoints/motionagformer/motionagformer-s-h36m.pth.tr
      (motionbert, mixste, poseformerv2, momask, potr also available)

    == MOTIONCLIP (HIGHEST PRIORITY — directly usable from our data) ==
    MotionCLIP was pretrained on diverse human motions. Use it as a frozen or
    fine-tunable encoder for gait features.

    Input format: (B, 60, 25, 6) — 60 frames, 25 joints (24 SMPL body + global),
    6D rotation representation (first two rows of rotation matrix, flattened).

    How to convert our data:
      aa = torch.from_numpy(pose.reshape(-1, 3)).float()   # (T*24, 3)
      rotmat = axis_angle_to_matrix(aa)                     # (T*24, 3, 3)
      rot6d  = matrix_to_rotation_6d(rotmat)                # (T*24, 6)
      rot6d  = rot6d.reshape(T, 24, 6)                      # (T, 24, 6)
      # pad 25th joint (translation) with zeros → (T, 25, 6)
      # center-crop or repeat-pad to 60 frames → (1, 60, 25, 6)

    How to load the pretrained encoder:
      import os
      from model.backbone_loader import load_pretrained_backbone
      ckpt = os.path.join(care_pd_dir,
          "assets/Pretrained_checkpoints/motionclip/motionclip_encoder_checkpoint_0100.pth.tar")
      encoder = load_pretrained_backbone({"backbone": "motionclip",
                                          "model_checkpoint_path": ckpt}, "motionclip")
      encoder = encoder.to(DEVICE).eval()
      # encoder(x, return_rep=True) → mu of shape (B, 512)

    Strategies with MotionCLIP:
      A. Frozen features: extract 512-dim mu per walk, train MLP/SVM/XGBoost classifier.
         Fast, no GPU needed for features. Good starting point.
      B. Fine-tune encoder: unfreeze last N transformer layers + train full model end-to-end.
         Needs lower LR (1e-5) for encoder, higher (1e-3) for classifier head.
      C. Multi-window aggregation: slide a 60-frame window over the full walk,
         extract features at each window, aggregate (mean/max/attention pooling).
      D. Temporal MotionCLIP: encode multiple 60-frame windows → sequence of 512-dim
         vectors → temporal transformer → classify.

    == OTHER PROMISING APPROACHES ==
    1. Custom temporal nets on 6D rotation sequences (144-dim input, variable T):
       - 1D-CNN with AdaptiveAvgPool (handles variable T, use GroupNorm not BatchNorm)
       - Temporal Transformer with CLS token
       - LSTM/GRU with per-sequence hidden state
       - TCN (temporal convolutional network)
       - Multi-scale CNN (different kernel sizes for stride/tremor frequencies)

    2. Physics-informed gait features:
       - Axis-angle velocity/acceleration per joint (diff along T axis)
       - Left/right limb asymmetry (paired joint rotation differences)
       - Stride frequency from FFT of hip/knee vertical oscillation
       - Freeze-of-gait proxy: high-frequency power ratio in ankle joints
       - Gait regularity: autocorrelation of pelvis rotation
       Convert to 3D positions first: axis_angle → matrix → skeleton FK

    3. Fine-tuning MotionAGFormer/MotionBERT for SMPL input:
       These expect H36M 17-joint 3D positions. You can derive approximate 3D positions
       from SMPL axis-angle using the SMPL kinematic chain and joint offsets:
         from utility.transforms.skeleton import Skeleton
         # Skeleton forward_kinematics(quat_params, root_pos) → 3D joint positions
       Then select 17 joints matching H36M indices and fine-tune the pretrained backbone.

    4. Loss improvements (import from learning.criterion):
       - FocalLoss: better for class imbalance than CrossEntropyLoss
       - WCELoss: class-weighted CE with configurable weights
       from learning.criterion import FocalLoss, WCELoss

    == CONSTRAINTS ==
    - run_evaluation(data, folds, care_pd_dir=None) must return dict with:
        combined_score (float in [0,1]), all_preds, all_labels,
        per_fold_results, per_class_f1
    - Predictions must be integers in {0, 1, 2}
    - Per-fold wall-clock: <5 min on GPU, <2 min on CPU
    - EVOLVE-BLOCK is the only mutable region
