    │ motionagformer  │ 57MB │ (B, T, 17, 2) h36m 2D ortho — needs preproc   │
    │ motionbert      │162MB │ (B, T, 17, 2) h36m 2D ortho — needs preproc   │
    │ motionbertlite  │ 61MB │ same as motionbert                             │
    │ mixste          │386MB │ (B, T, 17, 2) h36m 2D persp — needs preproc   │
