    ═══ AVAILABLE IMPORTS (all verified in CARE-PD venv) ═══════════════════════
    Standard: torch, torch.nn, torch.optim, numpy, sklearn, scipy, pandas
    CARE-PD (on sys.path):
      from data.preprocessing.preprocessing_utils import (
          axis_angle_to_quaternion, quaternion_to_matrix, axis_angle_to_matrix,
          matrix_to_rotation_6d, get_6D_rep_from_24x3_pose)
      from model.backbone_loader import load_pretrained_backbone, load_pretrained_weights, count_parameters
      from model.motionclip.transformer import Encoder_TRANSFORMER
      from model.motion_encoder import MotionEncoder, ClassifierHead
      from learning.criterion import FocalLoss, WCELoss
      from learning.utils import compute_class_weights
      from data.dataloaders import DataPreprocessor
      from utility.transforms.skeleton import Skeleton
      from utility.transforms.quaternion import qrot_np, qbetween_np

    ═══ LOSS FUNCTIONS (from learning/criterion.py) ════════════════════════════
    WCELoss:    nn.CrossEntropyLoss(weight=class_weights_tensor)
                Best for: stable training with known class imbalance
    FocalLoss:  alpha * (1-pt)^gamma * ce_loss
                Best for: hard examples, gamma=2.0 focuses on misclassified
    LabelSmoothingCE: KL-div with soft targets
                Best for: when class boundaries are clinically ambiguous (0 vs 1)

    Class weights for BMCLab: w_0≈0.76, w_1≈0.94, w_2≈1.59 (inverse frequency)
    Formula: w_c = N / (n_classes * count_c) then normalize

    ═══ CURRENT OurModel (in EVOLVE-BLOCK) ═════════════════════════════════════
    1D temporal CNN on (T, 342) features = 6D_rot(144) + velocity(144) + LR_asym(54)
    Architecture: 4× Conv1d + GroupNorm + GELU → masked mean pool → MLP head
    Params: ~620K  |  Expected: ~120s for 6 folds on RTX A5000  |  Loss: WCE

    ═══ HIGH-PRIORITY MUTATIONS ═════════════════════════════════════════════════
    1. ARCHITECTURE: Replace 1D-CNN with Temporal Transformer
       - CLS token + sinusoidal position encoding + N×TransformerEncoderLayer
       - Handles long-range dependencies (full walk temporal patterns)
       - d_model=128, nhead=4, num_layers=3, dim_feedforward=256

    2. FEATURES: Add acceleration (2nd-order temporal diff of 6D)
       - accel = np.diff(velocity, axis=0) padded → (T, 144)
       - WHY: tremor and freezing-of-gait show in 2nd-order dynamics

    3. FEATURES: Add per-joint range-of-motion (global, not temporal)
       - rom = (rot6d.max(0) - rot6d.min(0)) → (144,) scalar per walk
       - Concatenate as extra global features into classifier head

    4. TRAINING: Increase epochs 80→150, add warmup (first 10 epochs linear ramp)
       - WHY: 620 samples is small; longer training with LR warmup improves stability

    5. FEATURES: FFT frequency bands on lower-body joints (pelvis, hips, knees)
       - freqs = np.abs(np.fft.rfft(rot6d[:, :66], axis=0)) → frequency spectrum
       - Bands: tremor (4-8Hz), stride (0.5-2Hz), posture (<0.5Hz)

    6. ARCHITECTURE: Fine-tune MotionCLIP with sliding windows
       - Slide 60-frame window every 30 frames over full walk
       - Encode each window → mean-pool embeddings → MLP classifier
       - Unfreeze last 2 transformer layers for adaptation

    7. REGULARISATION: Add Mixup between same-class samples
       - alpha=0.2, mix in feature space after extraction
       - WHY: augments the tiny class-2 set (164 samples) with synthetic mixtures

    ═══ REQUIREMENTS FOR ALL MUTATIONS ═════════════════════════════════════════
    1. Keep run_evaluation() signature unchanged (fixed harness)
    2. Predictions must be integers in {0, 1, 2}
    3. Per-fold wall-clock < 5 min on GPU, < 2 min on CPU
    4. EVOLVE-BLOCK is the only mutable region
    5. Add "# WHY: <clinical/technical reason>" comment before EVERY change
    6. Add "# CHANGE: <what changed vs prior>" comment at top of EVOLVE-BLOCK
    7. Print param count: print(f"[model] params={count_params(model):,}")
    8. Print feature shape: print(f"[features] {n_dims}D per frame")
